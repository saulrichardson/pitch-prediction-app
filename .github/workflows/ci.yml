name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install uv
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:model
      - run: npm run build
